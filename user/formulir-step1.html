<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Diri - SiPeDes</title>
  <link rel="stylesheet" href="style-formulir.css">
</head>

<body>

<main class="form-page">

  <div class="breadcrumb">
    <a href="dashboard.html">Beranda</a>
    <span>›</span>
    <a href="pilih-surat.html">Pilih Surat</a>
    <span>›</span>
    <span>Isi Formulir</span>
  </div>

  <h1 id="judulSurat">Surat Domisili</h1>
  <p class="subtitle">Isi seluruh data dengan benar</p>

  <section class="user-card">
    <div class="avatar" id="userInitial">?</div>
    <div class="user-main">
      <h4 id="userName">Loading...</h4>
      <p id="userNik">Loading...</p>
    </div>
    <a href="dashboard.html">Lihat Profil</a>
  </section>

  <section class="stepper">
    <div class="step active">
      <span>1</span>
      <p>Data Diri</p>
    </div>
    <div class="line"></div>
    <div class="step">
      <span>2</span>
      <p>Keperluan</p>
    </div>
    <div class="line"></div>
    <div class="step">
      <span>3</span>
      <p>Dokumen</p>
    </div>
    <div class="line"></div>
    <div class="step">
      <span>4</span>
      <p>Kirim</p>
    </div>
  </section>

  <form action="formulir.html" method="GET">

    <input type="hidden" name="jenis" id="jenisInput">

    <label>Nama Lengkap *</label>
    <input type="text" name="nama" placeholder="Nama lengkap tanpa singkatan" required>

    <label>NIK *</label>
    <input type="text" name="nik" placeholder="NIK" maxlength="16" required>

    <label>No. Kartu Keluarga *</label>
    <input type="text" name="no_kk" placeholder="No. KK" maxlength="16" required>

    <label>Tempat Lahir</label>
    <input type="text" name="tempat_lahir" placeholder="Kota tempat lahir">

    <label>Tanggal Lahir</label>
    <input type="date" name="tanggal_lahir">

    <label>Jenis Kelamin</label>
    <select name="kelamin">
      <option value="">Pilih</option>
      <option value="L">Laki-laki</option>
      <option value="P">Perempuan</option>
    </select>

    <label>Alamat (sesuai KTP) *</label>
    <input type="text" name="alamat" placeholder="Jl. Nama Jalan No. XX" required>

    <label>RT</label>
    <input type="text" name="rt" placeholder="Contoh: 03" maxlength="3">

    <label>RW</label>
    <input type="text" name="rw" placeholder="Contoh: 21" maxlength="3">

    <label>Kelurahan</label>
    <input type="text" name="kelurahan" placeholder="Nama kelurahan">

    <div class="button-row">
      <a href="pilih-surat.html" class="btn-cancel">← Batal</a>
      <button type="submit" class="btn-next">Lanjut →</button>
    </div>

  </form>

</main>

<script>
const params = new URLSearchParams(window.location.search);
const jenis = params.get("jenis");

const suratMap = {
  domisili: "Surat Domisili",
  ktp: "Pengantar KTP / KK",
  usaha: "Surat Keterangan Usaha",
  waris: "Surat Ahli Waris",
  tidakmampu: "Surat Tidak Mampu",
};

if (jenis && suratMap[jenis]) {
  document.getElementById("judulSurat").textContent = suratMap[jenis];
  document.getElementById("jenisInput").value = jenis;
}

fetch("get-user.php")
  .then(res => res.json())
  .then(data => {
    if (data.status === "error") {
      window.location.href = "login.html";
      return;
    }
    document.getElementById("userName").textContent = data.nama;
    document.getElementById("userNik").textContent =
      "NIK: " + data.nik + " - RT " + data.rt + "/RW " + data.rw;
    document.getElementById("userInitial").textContent =
      data.nama.substring(0, 2).toUpperCase();
  });
</script>

</body>
</html>
