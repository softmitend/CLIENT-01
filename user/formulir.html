<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Isi Formulir - SiPeDes</title>
  <link rel="stylesheet" href="style-formulir.css">
</head>

<body>

<main class="form-page">

  <div class="breadcrumb">
    <a href="dashboard.html">Beranda</a>
    <span>›</span>
    <a href="pilih-surat.html">Pilih Surat</a>
    <span>›</span>
    <span>Isi Formulir</span>
  </div>

  <h1 id="judulSurat">Surat Domisili</h1>
  <p class="subtitle">Isi seluruh data dengan benar</p>

  <section class="user-card">
    <div class="avatar" id="userInitial">?</div>
    <div class="user-main">
      <h4 id="userName">Loading...</h4>
      <p id="userNik">Loading...</p>
    </div>
    <a href="dashboard.html">Lihat Profil</a>
  </section>

  <section class="stepper">
    <div class="step done">
      <span>1</span>
      <p>Data Diri</p>
    </div>
    <div class="line"></div>
    <div class="step active">
      <span>2</span>
      <p>Keperluan</p>
    </div>
    <div class="line"></div>
    <div class="step">
      <span>3</span>
      <p>Dokumen</p>
    </div>
    <div class="line"></div>
    <div class="step">
      <span>4</span>
      <p>Kirim</p>
    </div>
  </section>

  <form action="proses-pengajuan.php" method="POST">

    <input type="hidden" name="jenis_surat" id="jenisSurat">

    <label>Jenis Surat yang Diminta</label>
    <select name="jenis_surat_label" id="jenisSuratLabel" required>
      <option value="">Pilih jenis surat</option>
      <option value="Surat Domisili">Surat Domisili</option>
      <option value="Pengantar KTP / KK">Pengantar KTP / KK</option>
      <option value="Surat Keterangan Usaha">Surat Keterangan Usaha</option>
      <option value="Surat Ahli Waris">Surat Ahli Waris</option>
      <option value="Surat Tidak Mampu">Surat Tidak Mampu</option>
    </select>

    <label>Tujuan / Keperluan *</label>
    <input type="text" name="keperluan" placeholder="Contoh: Untuk keperluan administrasi sekolah" required>

    <label>Instansi / Tujuan Surat</label>
    <input type="text" name="instansi" placeholder="Contoh: Bank, sekolah, kantor, atau instansi lain">

    <label>Keterangan Tambahan</label>
    <textarea name="keterangan" placeholder="Tuliskan info tambahan jika perlu"></textarea>

    <label>Cara Ambil Surat *</label>
    <select name="cara_ambil" required>
      <option value="">Pilih cara ambil surat</option>
      <option value="Ambil di Kantor Desa">Ambil di Kantor Desa</option>
      <option value="Unduh PDF">Unduh PDF</option>
    </select>
    <small class="hint">Pilih bagaimana kamu ingin menerima surat setelah pengajuan selesai.</small>

    <div class="button-row">
      <a href="formulir-step1.html" class="btn-cancel">← Kembali</a>
      <button type="submit" class="btn-next">Lanjut →</button>
    </div>

  </form>

</main>

<script>
const params = new URLSearchParams(window.location.search);
const jenis = params.get("jenis");

const suratMap = {
  domisili: "Surat Domisili",
  ktp: "Pengantar KTP / KK",
  usaha: "Surat Keterangan Usaha",
  waris: "Surat Ahli Waris",
  tidakmampu: "Surat Tidak Mampu",
};

if (jenis && suratMap[jenis]) {
  document.getElementById("judulSurat").textContent = suratMap[jenis];
  document.getElementById("jenisSurat").value = jenis;
  document.getElementById("jenisSuratLabel").value = suratMap[jenis];
}

fetch("get-user.php")
  .then(res => res.json())
  .then(data => {
    if (data.status === "error") {
      window.location.href = "login.html";
      return;
    }

    document.getElementById("userName").textContent = data.nama;
    document.getElementById("userNik").textContent =
      "NIK: " + data.nik + " - RT " + data.rt + "/RW " + data.rw;

    document.getElementById("userInitial").textContent =
      data.nama.substring(0, 2).toUpperCase();
  });
</script>

</body>
</html>
