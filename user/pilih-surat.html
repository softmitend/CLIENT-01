<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ajukan Surat - SiPeDes</title>
  <link rel="stylesheet" href="style-pilih-surat.css">
</head>

<body>

<!-- HEADER -->
<header class="header">
  <div class="header-inner">

    <div class="brand">
      <div class="brand-logo">
        <img src="logo-desa.jpg" alt="Logo Desa">
      </div>

      <div class="brand-text">
        <span class="brand-name">SiPeDes</span>
        <span class="brand-sub">Desa Ciamis</span>
      </div>
    </div>

    <a href="dashboard.html" class="btn-dashboard">Beranda</a>

  </div>
</header>

<!-- MAIN -->
<main class="main">

  <div class="breadcrumb">
    <a href="dashboard.html">Beranda</a>
    <span>›</span>
    <span>Ajukan Surat</span>
  </div>

  <h1 class="page-title">Pilih Jenis Surat</h1>
  <p class="page-sub">Klik surat yang ingin kamu ajukan</p>

  <!-- GRID -->
  <div class="grid" id="grid">

    <div class="card" data-id="domisili" data-label="Surat Domisili" data-durasi="±1 hari" onclick="pilih(this)">
      <span class="card-ikon">🏠</span>
      <span class="card-nama">Surat Domisili</span>
      <span class="card-durasi">±1 hari</span>
    </div>

    <div class="card" data-id="ktp" data-label="Pengantar KTP/KK" data-durasi="±1 hari" onclick="pilih(this)">
      <span class="card-ikon">🪪</span>
      <span class="card-nama">Pengantar KTP/KK</span>
      <span class="card-durasi">±1 hari</span>
    </div>

    <div class="card" data-id="usaha" data-label="Ket. Usaha" data-durasi="±2 hari" onclick="pilih(this)">
      <span class="card-ikon">🏪</span>
      <span class="card-nama">Ket. Usaha</span>
      <span class="card-durasi">±2 hari</span>
    </div>

    <div class="card" data-id="waris" data-label="Ahli Waris" data-durasi="±3 hari" onclick="pilih(this)">
      <span class="card-ikon">📜</span>
      <span class="card-nama">Ahli Waris</span>
      <span class="card-durasi">±3 hari</span>
    </div>

    <div class="card" data-id="tidakmampu" data-label="Tidak Mampu" data-durasi="±2 hari" onclick="pilih(this)">
      <span class="card-ikon">💚</span>
      <span class="card-nama">Tidak Mampu</span>
      <span class="card-durasi">±2 hari</span>
    </div>

    <div class="card" data-id="kelakuan" data-label="Kelakuan Baik" data-durasi="±1 hari" onclick="pilih(this)">
      <span class="card-ikon">📄</span>
      <span class="card-nama">Kelakuan Baik</span>
      <span class="card-durasi">±1 hari</span>
    </div>

  </div>

  <!-- INFO -->
  <div class="info-bar" id="infoBar">
    <div class="info-kiri">
      <span id="infoIkon"></span>
      <span id="infoNama"></span>
    </div>
    <span id="infoEst"></span>
  </div>

  <!-- BUTTON -->
  <button class="btn-lanjut" id="btnLanjut" onclick="lanjut()">
    Lanjut isi formulir →
  </button>

</main>

<script>
let pilihan = null;

function pilih(el) {
  document.querySelectorAll('.card').forEach(c => c.classList.remove('aktif'));
  el.classList.add('aktif');

  pilihan = el.dataset;

  document.getElementById('infoIkon').textContent =
    el.querySelector('.card-ikon').textContent;

  document.getElementById('infoNama').textContent =
    pilihan.label + ' dipilih';

  document.getElementById('infoEst').textContent =
    'Estimasi: ' + pilihan.durasi + ' kerja';

  document.getElementById('infoBar').classList.add('show');
  document.getElementById('btnLanjut').classList.add('show');
}

function lanjut() {
  if (!pilihan) return;
  window.location.href = 'formulir-step1.html?jenis=' + pilihan.id;
}
</script>

</body>
</html>
